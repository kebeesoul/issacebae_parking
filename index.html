<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="펠리세이드·레이 주차 층(B1~B4)을 브라우저에 저장하고 다음 날 즉시 확인하는 차량 주차 위치 관리 앱" />
  <title>차량 주차 위치 — HYPLE</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ────────────────────── HEADER ────────────────────── -->
  <header class="header" role="banner">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-dot"></span>
        HYPLE
      </div>
      <nav class="nav-tabs" aria-label="탭 메뉴">
        <button class="nav-tab active" type="button" id="tab-parking">주차 관리</button>
        <button class="nav-tab" type="button" id="tab-info"
                onclick="alert('추가 기능 준비 중입니다.')">정보</button>
      </nav>
    </div>
  </header>

  <!-- ────────────────────── MAIN ────────────────────── -->
  <main class="page" role="main">

    <!-- 타이틀 영역 -->
    <section class="title-section" aria-labelledby="page-heading">
      <div class="brand-label" aria-hidden="true">
        🅿️ HYPLE
      </div>
      <h1 class="page-title" id="page-heading">
        차량 주차 위치<br>통합 관리
      </h1>
      <p class="page-desc">
        <span class="icon-lock" aria-hidden="true">🔒</span>
        백엔드 없이 브라우저에만 저장됩니다.
      </p>
    </section>

    <!-- 메인 카드 -->
    <section class="card" aria-label="주차 위치 입력 카드">

      <!-- 카드 헤더 -->
      <div class="card-header">
        <div class="step-badge" aria-label="Step 1">1</div>
        <span class="card-header-text">주차 층 선택 및 저장</span>
      </div>

      <!-- 카드 본문 -->
      <div class="card-body">

        <!-- 차량 선택 -->
        <div class="vehicle-grid">

          <div class="vehicle-field">
            <label class="field-label" for="car1-floor">
              <span class="car-icon" aria-hidden="true">🚙</span>
              펠리세이드
            </label>
            <select class="floor-select" id="car1-floor" aria-label="펠리세이드 주차 층 선택">
              <option value="">층 선택</option>
              <option value="B1">B1 — 지하 1층</option>
              <option value="B2">B2 — 지하 2층</option>
              <option value="B3">B3 — 지하 3층</option>
              <option value="B4">B4 — 지하 4층</option>
            </select>
          </div>

          <div class="vehicle-field">
            <label class="field-label" for="car2-floor">
              <span class="car-icon" aria-hidden="true">🚗</span>
              레이
            </label>
            <select class="floor-select" id="car2-floor" aria-label="레이 주차 층 선택">
              <option value="">층 선택</option>
              <option value="B1">B1 — 지하 1층</option>
              <option value="B2">B2 — 지하 2층</option>
              <option value="B3">B3 — 지하 3층</option>
              <option value="B4">B4 — 지하 4층</option>
            </select>
          </div>

        </div>

        <!-- 결과 박스 -->
        <div class="result-grid" aria-live="polite" aria-label="저장된 주차 위치">
          <div class="result-box empty" id="car1-result" role="status">
            <span class="result-label">펠리세이드</span>
            <span class="result-value">—</span>
            <span class="result-sub">저장된 위치 없음</span>
          </div>
          <div class="result-box empty" id="car2-result" role="status">
            <span class="result-label">레이</span>
            <span class="result-value">—</span>
            <span class="result-sub">저장된 위치 없음</span>
          </div>
        </div>

        <!-- 마지막 저장 시각 -->
        <div class="saved-at-row" aria-label="마지막 저장 시각">
          <span class="icon" aria-hidden="true">🕐</span>
          <span>마지막 저장:</span>
          <span id="saved-at">—</span>
        </div>

        <!-- 버튼 행 -->
        <div class="btn-row">
          <button class="btn btn-primary" id="save-btn" type="button">
            <span aria-hidden="true">💾</span>
            저장하기
          </button>
          <button class="btn btn-ghost" id="clear-btn" type="button" aria-label="주차 정보 초기화">
            <span aria-hidden="true">🗑️</span>
            초기화
          </button>
        </div>

        <!-- 저장 완료 피드백 -->
        <div class="save-feedback" id="save-feedback" role="alert" aria-live="assertive">
          <span aria-hidden="true">✅</span>
          저장 완료! 내일 아침 이 페이지를 열면 바로 확인됩니다.
        </div>

      </div><!-- /card-body -->
    </section><!-- /card -->

    <!-- 안내 스트립 -->
    <div class="info-strip" role="note">
      <span class="icon" aria-hidden="true">ℹ️</span>
      <span>
        저장된 데이터는 이 기기의 브라우저 <strong>localStorage</strong>에만 보관됩니다.
        동일한 브라우저에서 다시 열면 자동으로 복원됩니다.
        브라우저 데이터를 지우면 기록도 삭제됩니다.
      </span>
    </div>

  </main><!-- /page -->

  <script src="app.js"></script>
</body>
</html>
